<div>
    <section fw-if="!selectedDemo" class="container py-5">
        <h1 class="mb-2">FuseWire Demos</h1>
        <p class="text-body-secondary">Pick a demo to explore</p>
        <div class="row g-3 mt-3">
            <div fw-each="demo in demos" class="col-sm-6 col-md-4">
                <div class="card h-100 shadow-sm" role="button" onclick="((this)).selectDemo('((demo.name))')">
                    <div class="card-body">
                        <h5 class="card-title">((demo.name))</h5>
                        <p class="card-text text-body-secondary">((demo.description))</p>
                    </div>
                </div>
            </div>
        </div>
    </section>
    <section fw-if="selectedDemo" class="d-flex vh-100">
        <nav class="sidebar d-flex flex-column border-end bg-body-tertiary">
            <div class="sidebar-header">Demos</div>
            <div class="list-group list-group-flush flex-grow-1 overflow-auto">
                <a fw-each="demo in demos" class="list-group-item list-group-item-action ((demo.activeClass))" role="button" onclick="((this)).selectDemo('((demo.name))')">((demo.name))</a>
            </div>
            <div class="p-2 border-top">
                <button class="btn btn-sm btn-outline-secondary w-100" onclick="((this)).back()">Back</button>
            </div>
        </nav>
        <div class="flex-grow-1 d-flex flex-column panel">
            <div class="editor-grid flex-grow-1">
                <div class="border-end border-bottom d-flex flex-column panel">
                    <div class="panel-header">HTML</div>
                    <div class="editor-wrap flex-grow-1"><div class="fw-editor-html"></div></div>
                </div>
                <div class="border-bottom d-flex flex-column panel">
                    <div class="panel-header">CSS</div>
                    <div class="editor-wrap flex-grow-1"><div class="fw-editor-css"></div></div>
                </div>
                <div class="border-end d-flex flex-column panel">
                    <div class="panel-header">JS</div>
                    <div class="editor-wrap flex-grow-1"><div class="fw-editor-js"></div></div>
                </div>
                <div class="d-flex flex-column panel">
                    <div class="panel-header d-flex justify-content-between align-items-center">
                        <span>Output</span>
                        <button class="btn btn-sm btn-primary py-0 px-2" onclick="((this)).runDemo()">Run</button>
                    </div>
                    <div class="flex-grow-1 overflow-auto p-2 panel">((demoComponent))</div>
                </div>
            </div>
            <div class="console-bar border-top d-flex flex-column">
                <div class="panel-header">Console</div>
                <div class="flex-grow-1 overflow-auto panel">((consoleComponent))</div>
            </div>
        </div>
    </section>
</div>
