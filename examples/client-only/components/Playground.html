<div>
    <section fw-if="!selectedDemo" class="container py-5">
        <h1 class="mb-2">FuseWire Demos</h1>
        <p class="text-body-secondary">Pick a demo to explore</p>
        <div class="row g-3 mt-3">
            <div fw-each="demo in demos" class="col-sm-6 col-md-4">
                <div class="card h-100 shadow-sm" role="button" onclick="((this)).selectDemo('((demo.name))')">
                    <div class="card-body">
                        <h5 class="card-title">((demo.name))</h5>
                        <p class="card-text text-body-secondary">((demo.description))</p>
                    </div>
                </div>
            </div>
        </div>
    </section>
    <section fw-if="selectedDemo" class="d-flex vh-100">
        <nav class="d-flex flex-column border-end bg-body-tertiary" style="width:180px;min-width:180px">
            <div class="px-3 py-2 border-bottom fw-semibold small text-uppercase text-body-secondary">Demos</div>
            <div class="list-group list-group-flush flex-grow-1 overflow-auto">
                <a fw-each="demo in demos" class="list-group-item list-group-item-action ((demo.activeClass))" role="button" onclick="((this)).selectDemo('((demo.name))')">((demo.name))</a>
            </div>
            <div class="p-2 border-top">
                <button class="btn btn-sm btn-outline-secondary w-100" onclick="((this)).back()">Back</button>
            </div>
        </nav>
        <div class="flex-grow-1 d-flex flex-column" style="min-height:0">
            <div class="flex-grow-1" style="display:grid;grid-template-columns:1fr 1fr;grid-template-rows:1fr 1fr;min-height:0">
                <div class="border-end border-bottom d-flex flex-column" style="min-height:0">
                    <div class="px-3 py-1 border-bottom bg-body-tertiary small fw-semibold">HTML</div>
                    <pre class="flex-grow-1 overflow-auto m-0 p-2 small" style="min-height:0"><code>((htmlCode))</code></pre>
                </div>
                <div class="border-bottom d-flex flex-column" style="min-height:0">
                    <div class="px-3 py-1 border-bottom bg-body-tertiary small fw-semibold">CSS</div>
                    <pre class="flex-grow-1 overflow-auto m-0 p-2 small" style="min-height:0"><code>((cssCode))</code></pre>
                </div>
                <div class="border-end d-flex flex-column" style="min-height:0">
                    <div class="px-3 py-1 border-bottom bg-body-tertiary small fw-semibold">JS</div>
                    <pre class="flex-grow-1 overflow-auto m-0 p-2 small" style="min-height:0"><code>((jsCode))</code></pre>
                </div>
                <div class="d-flex flex-column" style="min-height:0">
                    <div class="px-3 py-1 border-bottom bg-body-tertiary small fw-semibold">Output</div>
                    <div class="flex-grow-1 overflow-auto p-2" style="min-height:0">((demoComponent))</div>
                </div>
            </div>
            <div class="border-top d-flex flex-column" style="height:150px;min-height:150px">
                <div class="px-3 py-1 border-bottom bg-body-tertiary small fw-semibold">Console</div>
                <div class="flex-grow-1 overflow-auto" style="min-height:0">((consoleComponent))</div>
            </div>
        </div>
    </section>
</div>
