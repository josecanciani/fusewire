<!doctype html>
<html lang="en" data-bs-theme="light">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FuseWire Demos</title>
    <link
          href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
          rel="stylesheet"
          integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
          crossorigin="anonymous" />
    <script
            src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
            integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
            crossorigin="anonymous"></script>
</head>
<body>
    <div id="app"></div>
    <script type="module">
        import {
            Reactor
        } from './js/reactor.js';

        const reactor = new Reactor('playground', {
            basePath: new URL('./components', window.location.href).href
        });

        await reactor.start(document.getElementById('app'), 'Playground/Home', 'main', {
            demos: [{
                    name: 'Counter',
                    title: 'Counter',
                    description: 'Increment and decrement buttons.',
                    tags: ['basics'],
                },
                {
                    name: 'GameOfLife/Game',
                    title: 'Game of Life',
                    description: "Conway's Game of Life. Click cells to toggle alive/dead, then play, step, or reset.",
                    tags: ['performance'],
                    components: [
                        'GameOfLife/Game',
                        'GameOfLife/Controls',
                        'GameOfLife/Stats',
                        'GameOfLife/Alive',
                        'GameOfLife/Dead',
                        'GameOfLife/Help',
                    ],
                },
            ],
        });

    </script>
</body>
</html>
