<div class="site-main" data-bs-theme="((theme))">
    <nav class="navbar navbar-expand-lg border-bottom sticky-top bg-body">
        <div class="container-fluid">
            <a class="navbar-brand d-flex align-items-center cursor-pointer" onclick="((this)).navigate('home')">
                <span class="fw-bold text-primary">FuseWire</span>
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#siteNavbar"
                    aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="siteNavbar">
                <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                    <li class="nav-item">
                        <a class="nav-link (($homeActiveClass)) cursor-pointer"
                           onclick="((this)).navigate('home')">Home</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link (($docsActiveClass)) cursor-pointer"
                           onclick="((this)).navigate('docs')">Docs</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link (($demoActiveClass)) cursor-pointer"
                           onclick="((this)).navigate('demo')">Playground</a>
                    </li>
                </ul>
                <div class="d-flex align-items-center">
                    <button type="button" class="btn btn-link nav-link me-3 p-0" onclick="((this)).toggleTheme()"
                            title="Toggle theme">
                        <svg fw-if="$isLightTheme" width="20" height="20" fill="currentColor" viewBox="0 0 16 16">
                            <path
                                  d="M8 11a3 3 0 1 1 0-6 3 3 0 0 1 0 6zm0 1a4 4 0 1 0 0-8 4 4 0 0 0 0 8zM8 0a.5.5 0 0 1 .5.5v2a.5.5 0 0 1-1 0v-2A.5.5 0 0 1 8 0zm0 13a.5.5 0 0 1 .5.5v2a.5.5 0 0 1-1 0v-2A.5.5 0 0 1 8 13zm8-5a.5.5 0 0 1-.5.5h-2a.5.5 0 0 1 0-1h2a.5.5 0 0 1 .5.5zM3 8a.5.5 0 0 1-.5.5h-2a.5.5 0 0 1 0-1h2A.5.5 0 0 1 3 8zm10.657-5.657a.5.5 0 0 1 0 .707l-1.414 1.415a.5.5 0 1 1-.707-.708l1.414-1.414a.5.5 0 0 1 .707 0zm-9.193 9.193a.5.5 0 0 1 0 .707L3.05 13.657a.5.5 0 0 1-.707-.707l1.414-1.414a.5.5 0 0 1 .707 0zm9.193 2.121a.5.5 0 0 1-.707 0l-1.414-1.414a.5.5 0 0 1 .707-.707l1.414 1.414a.5.5 0 0 1 0 .707zM4.464 4.465a.5.5 0 0 1-.707 0L2.343 3.05a.5.5 0 1 1 .707-.707l1.414 1.414a.5.5 0 0 1 0 .708z" />
                        </svg>
                        <svg fw-if="$isDarkTheme" width="20" height="20" fill="currentColor" viewBox="0 0 16 16">
                            <path
                                  d="M6 .278a.768.768 0 0 1 .08.858 7.208 7.208 0 0 0-.878 3.46c0 4.021 3.278 7.277 7.318 7.277.527 0 1.04-.055 1.533-.16a.787.787 0 0 1 .81.316.733.733 0 0 1-.031.893A8.349 8.349 0 0 1 8.344 16C3.734 16 0 12.286 0 7.71 0 4.266 2.114 1.312 5.124.06a.752.752 0 0 1 .876.218z" />
                        </svg>
                        <span class="visually-hidden">Toggle theme</span>
                    </button>
                    <a href="https://github.com/josecanciani/fusewire" class="btn btn-outline-secondary btn-sm"
                       target="_blank">
                        GitHub
                    </a>
                </div>
            </div>
        </div>
    </nav>

    <main class="site-content">
        <div fw-if="$isHome">
            ((landing))
        </div>
        <div fw-if="$isDocs">
            ((docs))
        </div>
        <div fw-if="$isDemo">
            ((demo))
        </div>
    </main>
</div>
