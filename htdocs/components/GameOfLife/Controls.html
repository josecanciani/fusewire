<div class="controls-bar" data-disabled="((disabled))">
    <div class="controls-buttons">
        <button type="button" class="btn btn-sm btn-success" fw-if="!running" onclick="((this)).play()">
            &#9654; Play
        </button>
        <button type="button" class="btn btn-sm btn-warning" fw-if="running" onclick="((this)).pause()">
            &#9646;&#9646; Pause
        </button>
        <button type="button" class="btn btn-sm btn-secondary" onclick="((this)).step()">&#8250; Step</button>
        <button type="button" class="btn btn-sm btn-outline-danger" onclick="((this)).reset()">&#8635; Reset</button>
        <button type="button" class="btn btn-sm btn-outline-info" fw-if="!showHelp" onclick="((this)).toggleHelp()">
            ? Help
        </button>
        <button type="button" class="btn btn-sm btn-info" fw-if="showHelp" onclick="((this)).toggleHelp()">
            &#10005; Close Help
        </button>
    </div>
    <div class="controls-speed">
        <label class="speed-label">Speed</label>
        <input
               type="range"
               class="form-range speed-range"
               min="1"
               max="20"
               value="((speedLevel))"
               oninput="((this)).changeSpeed(event)" />
    </div>
</div>
