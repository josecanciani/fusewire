<div class="stats-bar">
    <div class="stats-row">
        <span>Gen: <strong>((generation))</strong></span>
        <span>Cells: <strong>((cellCount))</strong></span>
        <span>Created: <strong>((totalCreated))</strong></span>
        <span>Destroyed: <strong>((totalDestroyed))</strong></span>

    <div class="stats-row">

        <span>Peak: <strong>((maxCreatedPerSecond))</strong>/s</span>
    </div>
</div>
