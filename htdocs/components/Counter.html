<div class="counter">
    <h1>((componentName))</h1>
    <div class="counter-display">
        <p class="counter-value">((count))</p>
    </div>
    <div class="counter-controls">
        <button class="btn" onclick="((this)).decrement()">-</button>
        <button class="btn" onclick="((this)).increment()">+</button>
    </div>
</div>
