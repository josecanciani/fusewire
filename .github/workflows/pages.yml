name: Deploy to GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Setup Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true
        
      - name: Build static site
        run: |
          npm install
          mkdir public
          cp -r htdocs/* public/
          mkdir -p public/js
          cp -r src/* public/js/
          mkdir -p public/node_modules
          cp -r node_modules/idiomorph public/node_modules/
          cp -r node_modules/bootstrap public/node_modules/
          cp -r node_modules/marked public/node_modules/
          cp -r node_modules/codemirror public/node_modules/
          cp -r node_modules/@codemirror public/node_modules/
          cp -r node_modules/@lezer public/node_modules/
          cp -r node_modules/crelt public/node_modules/
          cp -r node_modules/style-mod public/node_modules/
          cp -r node_modules/w3c-keyname public/node_modules/
          cp -r node_modules/@marijn public/node_modules/
          
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './public'
          
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
